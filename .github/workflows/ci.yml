name: CI

# Gates every PR (and pushes to main) on the same checks we run locally:
# typecheck · lint · unit tests · build, plus the Playwright E2E suite in its
# deterministic template-fallback mode (no LLM_ENGINE / GEMINI_API_KEY → no
# external model calls, so CI never depends on a model or a subscription).

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "context-map.json"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "context-map.json"
      - "docs/**"
  schedule:
    - cron: "0 6 * * *" # nightly full E2E against main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright · mock engine)
    # Most expensive job (chromium + system deps install every run). Run it on
    # PRs and nightly — NOT on every direct push to main. A typical small AI
    # commit doesn't regress the funnel; the nightly cron is the main-branch net.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium
      - name: Run E2E (template fallback — no model calls)
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
